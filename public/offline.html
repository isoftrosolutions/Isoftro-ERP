<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — iSoftro ERP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F8FAFC;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,109,68,0.1);
        }
        .offline-icon {
            width: 80px;
            height: 80px;
            background: #F0FDF4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .offline-icon svg {
            width: 40px;
            height: 40px;
            stroke: #006D44;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1A3C34;
            margin-bottom: 12px;
        }
        p {
            font-size: 15px;
            color: #4A6355;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .retry-btn {
            background: #006D44;
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .retry-btn:hover {
            background: #004D30;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,109,68,0.2);
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
            </svg>
        </div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry, your data is safe. Please check your connection and try again.</p>
        <button class="retry-btn" onclick="window.location.reload()">
            Try Again
        </button>
    </div>
</body>
</html>
